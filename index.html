<html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Card Naruto</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="card">

    <img src="https://i.imgur.com/2yAfX.jpg" alt="Naruto">

    <h1>Naruto Uzumaki</h1>

    <h2 class="tipo">Herói / Ninja</h2>

    <div class="status">
      
      <p>Vida</p>
      <div class="barra">
        <div class="progresso vida"></div>
      </div>

      <p>Poder</p>
      <div class="barra">
        <div class="progresso poder"></div>
      </div>

      <p>Velocidade</p>
      <div class="barra">
        <div class="progresso velocidade"></div>
      </div>

    </div>

  </div>

</body>
</html>
